<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<meta property="og:image" content="{{ SITEURL }}/eyob-hero.jpg" />
<meta property="og:title" content="Eyob Dereje Bekele | Financial & Digital Services" />
<meta property="og:description" content="Professional portfolio and business website offering financial analysis, credit assessment, website creation, and resume design services." />
<meta property="og:type" content="website" />
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
  <meta name="description" content="{% block description %}Eyob Dereje Bekele – Financial technology, banking, and freelance digital services.{% endblock %}" />
  
  <!-- Tailwind + dark mode -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a' }
          }
        }
      }
    }
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    .timeline::before { content:''; position:absolute; left:1.25rem; top:0; bottom:0; width:2px; background:#14b8a6; }
    .dark .timeline::before { background:#2dd4bf; }
    .timeline-item::before { content:''; position:absolute; left:0.45rem; top:0.25rem; width:1rem; height:1rem; border-radius:50%; background:#14b8a6; box-shadow:0 0 0 4px #ccfbf1; }
    .dark .timeline-item::before { background:#2dd4bf; box-shadow:0 0 0 4px #134e4a; }
    body { transition: background-color 0.3s, color 0.3s; }
  </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans">

  <!-- Header identical to previous version -->
  <header class="fixed w-full top-0 z-50 bg-white/90 dark:bg-gray-900/90 backdrop-blur shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <a href="#" class="text-2xl font-bold text-brand-700 dark:text-brand-400">Eyob D. Bekele</a>
        <nav class="hidden md:flex space-x-8 text-sm font-medium">
          <a href="#about" class="hover:text-brand-600 dark:hover:text-brand-400">About</a>
          <a href="#services" class="hover:text-brand-600 dark:hover:text-brand-400">Services</a>
          <a href="#experience" class="hover:text-brand-600 dark:hover:text-brand-400">Experience</a>
          <a href="#education" class="hover:text-brand-600 dark:hover:text-brand-400">Education</a>
          <a href="#contact" class="hover:text-brand-600 dark:hover:text-brand-400">Contact</a>
          <button id="theme-toggle" class="text-xl"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i></button>
        </nav>
        <div class="md:hidden flex items-center gap-3">
          <button id="theme-toggle-mobile" class="text-xl"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i></button>
          <button id="menu-btn" class="text-2xl"><i class="fas fa-bars"></i></button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-2 text-sm font-medium">
        <a href="#about" class="block py-1">About</a>
        <a href="#services" class="block py-1">Services</a>
        <a href="#experience" class="block py-1">Experience</a>
        <a href="#education" class="block py-1">Education</a>
        <a href="#contact" class="block py-1">Contact</a>
      </div>
    </div>
  </header>

  <!-- Main content block -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
      <p class="text-sm text-gray-500">© <span id="year"></span> Created By Eyob D. ● Be Positive.</p>
      <div class="flex space-x-5 text-xl text-gray-400 dark:text-gray-500">
        <a href="https://www.linkedin.com/in/eyobderejebekele-bb8a02379?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="hover:text-brand-600"><i class="fab fa-linkedin"></i></a>
        <a href="https://wa.me/251940887089" target="_blank" class="hover:text-brand-600"><i class="fab fa-whatsapp"></i></a>
        <a href="mailto:eyobita123@gmail.com" class="hover:text-brand-600"><i class="fas fa-envelope"></i></a>
      </div>
    </div>
  </footer>

  <button id="back-to-top" class="fixed bottom-6 right-6 z-40 p-3 rounded-full bg-brand-600 text-white shadow-lg hover:bg-brand-700 transition opacity-0 invisible"><i class="fas fa-arrow-up"></i></button>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
    const html = document.documentElement;
    function setDark(d) { if(d){ html.classList.add('dark'); localStorage.setItem('theme','dark'); } else { html.classList.remove('dark'); localStorage.setItem('theme','light'); } }
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) setDark(true);
    document.querySelectorAll('#theme-toggle, #theme-toggle-mobile').forEach(b => b.addEventListener('click', () => setDark(!html.classList.contains('dark'))));
    document.getElementById('menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.toggle('hidden'));
    document.querySelectorAll('#mobile-menu a').forEach(a => a.addEventListener('click', () => document.getElementById('mobile-menu').classList.add('hidden')));
    const btt = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => { if (window.scrollY > 500) { btt.classList.remove('opacity-0','invisible'); btt.classList.add('opacity-100','visible'); } else { btt.classList.add('opacity-0','invisible'); btt.classList.remove('opacity-100','visible'); } });
    btt.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
